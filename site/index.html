<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lafayette Consulting</title>
    <meta name="description" content="Lafayette Consulting website placeholder.">
    <style>
        :root {
            color-scheme: light dark;
            --accent: #00a9c7;
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #172033;
            --muted: #5d687a;
            --border: #dde3ec;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0e1013;
                --card: #1b1d22;
                --text: #f4f5f7;
                --muted: #b9c0cc;
                --border: #30343b;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.6;
        }

        main {
            width: min(680px, calc(100% - 32px));
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: clamp(28px, 6vw, 52px);
        }

        .eyebrow {
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            margin: 0 0 8px;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 6vw, 3rem);
            line-height: 1.2;
        }

        p {
            color: var(--muted);
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <main>
        <p class="eyebrow">Lafayette Consulting</p>
        <h1>Website coming soon</h1>
        <p>
           
        </p>
    </main>
</body>
</html>
